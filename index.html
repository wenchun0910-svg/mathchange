<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小數換分數測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
        }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            font-size: 1.25rem;
            font-weight: bold;
        }
        .fraction > span:first-child {
            border-bottom: 2px solid #374151;
            padding: 0 0.2rem;
        }
        .fraction > span:last-child {
            padding: 0 0.2rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden p-6 transition-all duration-300">
        
        <!-- Screen 1: 開始畫面 -->
        <div id="start-screen" class="text-center block">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">🔢 小數化為分數測驗</h1>
            <p class="text-gray-500 mb-6">測試你對常見小數與分數轉換的熟悉度！</p>
            
            <div class="mb-4 text-left">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">請輸入你的名字：</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="例如：王小明">
            </div>
            
            <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                開始測驗
            </button>
        </div>

        <!-- Screen 2: 測驗畫面 -->
        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="question-progress" class="text-sm font-semibold text-gray-500">題目 1 / 20</span>
                <span class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">分數測驗</span>
            </div>
            
            <div class="bg-gray-50 rounded-xl p-6 text-center mb-6 border border-gray-100 shadow-inner">
                <p class="text-lg text-gray-600 mb-2">請將此小數化為最簡分數：</p>
                <div class="text-5xl font-extrabold text-gray-800 tracking-wider" id="current-question">0.25</div>
            </div>

            <div id="options-container" class="grid grid-cols-2 gap-4">
                <!-- 選項按鈕會透過 JS 動態產生 -->
            </div>
        </div>

        <!-- Screen 3: 結果畫面 -->
        <div id="result-screen" class="hidden text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">測驗結束！</h2>
            <p class="text-gray-600 mb-6" id="result-name">王小明，你的成績是：</p>
            
            <div class="text-6xl font-black text-blue-600 mb-2" id="final-score">100</div>
            <p class="text-gray-500 mb-8 font-medium">分 / 100 分</p>

            <div id="save-status" class="mb-6 text-sm font-semibold px-4 py-3 rounded-lg bg-yellow-50 text-yellow-700 border border-yellow-200">
                ⏳ 正在將成績儲存至雲端...
            </div>

            <button onclick="resetQuiz()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-200">
                再測一次
            </button>
        </div>

    </div>

    <script>
        // ==========================================
        // ⚠️ 重要：請將下方的字串替換為你 Google Apps Script 的網址
        // ==========================================
        const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL'; 
        
        // 題庫資料
        const allQuestions = [
            { q: "0.2", a: { top: "1", bottom: "5" }, options: [{t:"1",b:"5"}, {t:"1",b:"2"}, {t:"1",b:"4"}, {t:"2",b:"5"}] },
            { q: "0.4", a: { top: "2", bottom: "5" }, options: [{t:"2",b:"5"}, {t:"1",b:"4"}, {t:"3",b:"5"}, {t:"1",b:"5"}] },
            { q: "0.5", a: { top: "1", bottom: "2" }, options: [{t:"1",b:"2"}, {t:"1",b:"5"}, {t:"1",b:"4"}, {t:"2",b:"4"}] },
            { q: "0.25", a: { top: "1", bottom: "4" }, options: [{t:"1",b:"4"}, {t:"1",b:"5"}, {t:"3",b:"4"}, {t:"2",b:"5"}] },
            { q: "0.75", a: { top: "3", bottom: "4" }, options: [{t:"3",b:"4"}, {t:"1",b:"4"}, {t:"3",b:"8"}, {t:"1",b:"2"}] },
            { q: "0.125", a: { top: "1", bottom: "8" }, options: [{t:"1",b:"8"}, {t:"1",b:"4"}, {t:"3",b:"8"}, {t:"1",b:"5"}] },
            { q: "0.375", a: { top: "3", bottom: "8" }, options: [{t:"3",b:"8"}, {t:"1",b:"8"}, {t:"5",b:"8"}, {t:"3",b:"4"}] },
            { q: "0.625", a: { top: "5", bottom: "8" }, options: [{t:"5",b:"8"}, {t:"3",b:"8"}, {t:"7",b:"8"}, {t:"5",b:"6"}] },
            { q: "0.875", a: { top: "7", bottom: "8" }, options: [{t:"7",b:"8"}, {t:"5",b:"8"}, {t:"3",b:"8"}, {t:"1",b:"8"}] },
            { q: "0.6", a: { top: "3", bottom: "5" }, options: [{t:"3",b:"5"}, {t:"2",b:"5"}, {t:"4",b:"5"}, {t:"3",b:"4"}] },
            { q: "0.8", a: { top: "4", bottom: "5" }, options: [{t:"4",b:"5"}, {t:"3",b:"5"}, {t:"1",b:"5"}, {t:"2",b:"5"}] },
            { q: "0.05", a: { top: "1", bottom: "20" }, options: [{t:"1",b:"20"}, {t:"1",b:"5"}, {t:"1",b:"10"}, {t:"5",b:"100"}] },
            { q: "0.1", a: { top: "1", bottom: "10" }, options: [{t:"1",b:"10"}, {t:"1",b:"100"}, {t:"1",b:"5"}, {t:"2",b:"10"}] },
            { q: "0.3", a: { top: "3", bottom: "10" }, options: [{t:"3",b:"10"}, {t:"1",b:"3"}, {t:"3",b:"100"}, {t:"3",b:"5"}] },
            { q: "0.7", a: { top: "7", bottom: "10" }, options: [{t:"7",b:"10"}, {t:"1",b:"7"}, {t:"7",b:"100"}, {t:"7",b:"20"}] },
            { q: "0.9", a: { top: "9", bottom: "10" }, options: [{t:"9",b:"10"}, {t:"9",b:"100"}, {t:"1",b:"9"}, {t:"9",b:"20"}] },
            { q: "0.15", a: { top: "3", bottom: "20" }, options: [{t:"3",b:"20"}, {t:"15",b:"100"}, {t:"1",b:"15"}, {t:"3",b:"10"}] },
            { q: "0.35", a: { top: "7", bottom: "20" }, options: [{t:"7",b:"20"}, {t:"35",b:"100"}, {t:"7",b:"10"}, {t:"3",b:"5"}] },
            { q: "0.45", a: { top: "9", bottom: "20" }, options: [{t:"9",b:"20"}, {t:"45",b:"100"}, {t:"9",b:"10"}, {t:"4",b:"5"}] },
            { q: "0.04", a: { top: "1", bottom: "25" }, options: [{t:"1",b:"25"}, {t:"4",b:"100"}, {t:"1",b:"4"}, {t:"2",b:"50"}] }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userName = "";

        // 工具函式：打亂陣列順序
        function shuffleArray(array) {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function formatFraction(top, bottom) {
            return `<div class="fraction"><span>${top}</span><span>${bottom}</span></div>`;
        }

        function switchScreen(screenId) {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById(screenId).classList.add('block');
        }

        function startQuiz() {
            const nameInput = document.getElementById('username').value.trim();
            if (!nameInput) {
                alert("請先輸入你的名字喔！");
                return;
            }
            userName = nameInput;
            score = 0;
            currentQuestionIndex = 0;
            
            // 隨機挑選 20 題
            currentQuestions = shuffleArray(allQuestions).slice(0, 20);
            
            switchScreen('quiz-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const qData = currentQuestions[currentQuestionIndex];
            
            document.getElementById('question-progress').innerText = `題目 ${currentQuestionIndex + 1} / 20`;
            document.getElementById('current-question').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // 打亂選項順序
            const shuffledOptions = shuffleArray(qData.options);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-800 font-bold py-6 rounded-xl transition duration-200 shadow-sm flex items-center justify-center";
                btn.innerHTML = formatFraction(opt.t, opt.b);
                btn.onclick = () => checkAnswer(opt, qData.a);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOpt, correctOpt) {
            if (selectedOpt.t === correctOpt.top && selectedOpt.b === correctOpt.bottom) {
                score += 5; // 每題 5 分，總分維持 100 分
            }
            
            currentQuestionIndex++;
            
            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            switchScreen('result-screen');
            document.getElementById('result-name').innerText = `${userName}，你的成績是：`;
            document.getElementById('final-score').innerText = score;
            
            saveToGoogleSheets(userName, score);
        }

        function saveToGoogleSheets(name, finalScore) {
            const statusBox = document.getElementById('save-status');
            
            if (SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                statusBox.className = "mb-6 text-sm font-semibold px-4 py-3 rounded-lg bg-red-50 text-red-700 border border-red-200";
                statusBox.innerHTML = "⚠️ 尚未設定 Google 試算表連結，成績僅顯示於此。";
                return;
            }

            statusBox.className = "mb-6 text-sm font-semibold px-4 py-3 rounded-lg bg-yellow-50 text-yellow-700 border border-yellow-200";
            statusBox.innerHTML = "⏳ 正在將成績儲存至雲端...";

            const formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('score', finalScore);

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
            .then(response => {
                statusBox.className = "mb-6 text-sm font-semibold px-4 py-3 rounded-lg bg-green-50 text-green-700 border border-green-200";
                statusBox.innerHTML = "✅ 成績已成功儲存至試算表！";
            })
            .catch(error => {
                console.error('Error:', error);
                statusBox.className = "mb-6 text-sm font-semibold px-4 py-3 rounded-lg bg-red-50 text-red-700 border border-red-200";
                statusBox.innerHTML = "❌ 儲存失敗，請確認網路連線或系統設定。";
            });
        }

        function resetQuiz() {
            document.getElementById('username').value = '';
            switchScreen('start-screen');
        }
    </script>
</body>
</html>
